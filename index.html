<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">

  <title>WebAR Test Project</title>

  <link rel="stylesheet" href="style.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="info"></div>

  <!-- iPhone / iPad 用 -->
  <div id="ios-ar" style="display: none;">
    <a rel="ar" href="./model/Statue01.usdz">
      <button id="ios-ar-button">
        ARで見る
      </button>
    </a>
  </div>

  <!-- Android WebXR 用 -->
  <script type="module" src="script.js?v=30"></script>

  <script>
    const isIOS =
      /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const info = document.getElementById("info");
    const iosAr = document.getElementById("ios-ar");

    if (isIOS) {
      iosAr.style.display = "block";
      info.innerHTML = "<p>iPhone / iPad：ボタンを押してARを起動してください。</p>";
    } else {
      info.innerHTML = "<p>Android：画面下のARボタンから起動してください。</p>";
    }
  </script>
</body>
</html>
